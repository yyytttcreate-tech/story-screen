<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>STORY SCREEN</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#0c0c0c;color:#c8c4bc;font-size:14px;display:flex;flex-direction:column;}

/* TOP */
.topbar{background:#080808;border-bottom:1px solid #1e1e1e;flex-shrink:0;}
.topbar-row{display:flex;align-items:center;padding:0 14px;height:50px;gap:10px;}
.work-btn{flex:1;text-align:left;background:transparent;border:none;color:#c8c4bc;font-size:15px;cursor:pointer;padding:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:inherit;}
.chev{font-size:10px;color:#3a3a3a;margin-left:4px;}
.export-btn{background:transparent;border:1px solid #1e1e1e;border-radius:4px;color:#3a3a3a;font-size:11px;padding:4px 10px;cursor:pointer;font-family:inherit;flex-shrink:0;}

/* WORK MENU */
.work-menu{border-top:1px solid #1e1e1e;max-height:45vh;overflow-y:auto;display:none;}
.wm-item{display:flex;align-items:center;padding:0 14px;height:46px;border-bottom:1px solid #111;gap:8px;}
.wm-item.active{background:#141414;}
.wm-name{flex:1;font-size:14px;color:#666;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.wm-name.active{color:#c8c4bc;}
.wm-edit-btn{background:transparent;border:none;color:#333;font-size:11px;cursor:pointer;padding:0 4px;font-family:inherit;}
.wm-del-btn{background:transparent;border:none;color:#2a2a2a;font-size:16px;cursor:pointer;padding:0 2px;font-family:inherit;}
.wm-input{flex:1;background:#1a1a1a;border:1px solid #a08050;border-radius:3px;color:#c8c4bc;font-size:14px;padding:3px 8px;outline:none;font-family:inherit;}
.wm-add{padding:13px 14px;color:#3a3a3a;font-size:13px;cursor:pointer;}

/* CONTENT */
.content{flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column;}

/* CARD VIEW */
.card-view{flex:1;overflow-y:auto;padding:14px 14px 80px;-webkit-overflow-scrolling:touch;display:none;}
.card-view.on{display:block;}
.card{margin-bottom:12px;background:#0f0f0f;border:1px solid #1e1e1e;border-radius:6px;overflow:hidden;}
.card-head{display:flex;align-items:center;padding:10px 14px 8px;gap:8px;}
.card-heading{flex:1;font-size:13px;font-weight:700;line-height:1.4;}
.card-edit-btn{background:transparent;border:none;color:#333;font-size:11px;cursor:pointer;padding:2px 6px;font-family:inherit;}
.card-del-btn{background:transparent;border:none;color:#2a2a2a;font-size:13px;cursor:pointer;padding:2px 4px;font-family:inherit;}
.card-body{padding:0 14px 12px;font-size:13px;color:#888;line-height:1.9;white-space:pre-wrap;}
.card-edit{padding:12px;}
.edit-head{width:100%;background:#0a0a0a;border-radius:4px;color:#c8c4bc;font-size:13px;font-weight:700;padding:6px 10px;outline:none;font-family:inherit;margin-bottom:8px;border:none;}
.edit-body{width:100%;min-height:80px;background:#0a0a0a;border:1px solid #1e1e1e;border-radius:4px;color:#aaa;font-size:13px;line-height:1.9;padding:6px 10px;resize:vertical;outline:none;font-family:inherit;}
.edit-acts{display:flex;gap:8px;margin-top:8px;}
.btn-save{background:#0a140a;border:1px solid #253525;border-radius:4px;color:#6aaa6a;font-size:12px;padding:5px 14px;cursor:pointer;font-family:inherit;}
.btn-cancel{background:transparent;border:1px solid #1e1e1e;border-radius:4px;color:#3a3a3a;font-size:12px;padding:5px 14px;cursor:pointer;font-family:inherit;}
.add-block-ta{width:100%;min-height:100px;background:#0a0a0a;border:1px solid #1e1e1e;border-radius:4px;color:#c8c4bc;font-size:13px;line-height:1.9;padding:8px 10px;resize:vertical;outline:none;font-family:inherit;}
.add-trigger{width:100%;background:transparent;border:1px dashed #1e1e1e;border-radius:6px;color:#3a3a3a;font-size:13px;padding:12px;cursor:pointer;font-family:inherit;letter-spacing:1px;}

/* CONTE VIEW */
.conte-view{flex:1;display:none;flex-direction:column;overflow:hidden;}
.conte-view.on{display:flex;}
.ep-bar{overflow-x:auto;border-bottom:1px solid #1e1e1e;background:#080808;flex-shrink:0;-webkit-overflow-scrolling:touch;}
.ep-bar::-webkit-scrollbar{display:none;}
.ep-row{display:inline-flex;padding:0 10px;min-width:100%;white-space:nowrap;}
.ep-btn{padding:9px 14px;border:none;background:transparent;color:#3a3a3a;font-size:13px;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-0.5px;}
.ep-btn.on{color:#9a7abf;border-bottom-color:#9a7abf;font-weight:700;}
.ep-add-btn{padding:9px 10px;border:none;background:transparent;color:#3a3a3a;font-size:18px;cursor:pointer;margin-bottom:-0.5px;line-height:1;}
.ep-input{background:#1a1a1a;border:1px solid #9a7abf;border-radius:3px;color:#c8c4bc;font-size:13px;padding:3px 8px;outline:none;font-family:inherit;width:80px;margin:6px 4px;}
.conte-ta{flex:1;background:#0d0d0d;border:none;outline:none;color:#c8c4bc;font-size:15px;line-height:2.2;padding:20px 18px;resize:none;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;caret-color:#9a7abf;-webkit-overflow-scrolling:touch;}

/* TABS */
.tabbar{display:flex;background:#080808;border-top:1px solid #1e1e1e;flex-shrink:0;}
.tab{flex:1;padding:13px 2px 11px;background:transparent;border:none;border-top:2px solid transparent;color:#404040;font-size:12px;cursor:pointer;font-family:inherit;transition:all .12s;}
.tab.on{font-weight:700;}
</style>

const KIHON = `▼原案
秘密は墓まで持っていく
でも墓にお前がいないと喋れない
同じ墓に入ってくれ

心中未遂で一人だけ死んだ夜。残された二人は互いを庇い、互いを「犯人」だと思いながら、誰にも言えないまま生き続ける。

const KOUSEI = `▼ミスリード設計
冒頭（ユウマの返り血）→「ユウマが殺した？」血・無表情・ボタンで殺人感演出

const KYARA = `▼ユウマ（攻め）
明るくおしゃべり。見かけはバカで軽い。
「喋る」ことで"罪悪感を散らそう"としてる節あり。
無意識に真相を口にしそうになる→受けに止められる。

「一緒に行こうって言って、うなずいてくれたら、俺、最後までちゃんと寂しかったって思える気がした」
「軽薄なラブソングを楽しめない自分が嫌いだった。笑ってる人を、どこか他人事みたいに見てる自分も。」
「あいつ、いいよな。どんな顔してても"生きてる"って感じがする」
「なんで、ああいうふうに笑えるんだろう。怖くないのかな。……先のこととか」`;

const PLOT = `▼事件の真実

const SCENE_DATA = `▼冒頭イメージ
血みどろの攻め
血まみれで絶望顔の受け

▼屋上・事件の夜（アキ視点）

「死ぬなよ……お願いだからさ……」

▼事件直後
アキ「俺が……殺した……俺が、手を離したから……」
アキ「なんで来たの！？なんであんたが来たの……っ！！」
ユウマ「お前が、好きだったから……」

▼現代・眠るアキ
アキが眠ったまま「……リツ」とつぶやく

大学進学後、地元に帰りにくいユウマとアキ
リツ「誰かといる時の方が寂しさを感じるんだ、変だろ？」

▼回想①弁当シーン
教室の窓際、昼休み。ユウマが「今日も全部食い切れなかった」と笑って弁当の残りを差し出す。
アキが箸を止める。「それ昨日も言ってた」

「眠れないって話をしても、誰も眠らせてくれるわけじゃないから」
そう言って、リツは視線を動かさないまま、アキのノートに手を伸ばし、間違いを指でなぞる。

▼回想③ユウマが笑いを取ろうとしてスベった昼休み
ユウマがバカみたいな替え歌を大声で歌いながら教室に入ってくる。
クラスは失笑。アキは呆れてプリントに目を戻す。
リツだけが一瞬、口元をほころばせたのをアキは見逃さなかった。

そのノートには、細く揃った字でびっしりと過去問の回答が書かれていて、

// ── state ──
let works = [], curWid = null, curSec = '基本', curEp = 'unset', menuOpen = false, editingWid = null, editingCardIdx = null, addingCard = false, addingEp = false;

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }

function load(){
  try {
    const d = JSON.parse(localStorage.getItem(SK) || 'null');
    if(d && d.length){ works = d; curWid = works[0].id; return; }
  } catch(e){}
  works = [
    { id: uid(), title:'秘密を墓まで', data:{ 基本:KIHON, 構成:KOUSEI, キャラ:KYARA, プロット:PLOT, シーン:SCENE_DATA, コンテ:'' }, eps:[] },
    { id: uid(), title:'奈落', data:{ 基本:'', 構成:'', キャラ:'', プロット:'', シーン:'', コンテ:'' }, eps:[] },
  ];
  curWid = works[0].id;
}

function save(){ localStorage.setItem(SK, JSON.stringify(works)); }

function getWork(){ return works.find(w => w.id === curWid); }

function getConteKey(){ return curEp === 'unset' ? 'コンテ' : 'コンテ_' + curEp; }

// ── parse blocks ──
function parseBlocks(text){
  if(!text || !text.trim()) return [];
  const parts = text.split(/\n▼/);
  return parts.map((chunk, i) => {
    const t = (i===0 ? chunk.replace(/^▼/,'') : chunk).trimStart();
    const nl = t.indexOf('\n');
    if(nl === -1) return { heading: t.trim(), body: '' };
    return { heading: t.slice(0, nl).trim(), body: t.slice(nl+1).trim() };
  }).filter(b => b.heading || b.body);
}

function blocksToText(blocks){
  return blocks.map(b => `▼${b.heading}\n${b.body}`).join('\n\n');
}

// ── render ──
function render(){
  const w = getWork();
  // title
  document.getElementById('workTitle').textContent = w ? w.title : '';
  // menu
  renderMenu();
  // tabs
  renderTabs();
  // content
  if(curSec === 'コンテ'){
    document.getElementById('cardView').classList.remove('on');
    document.getElementById('conteView').classList.add('on');
    renderEpBar();
    renderConteTA();
  } else {
    document.getElementById('conteView').classList.remove('on');
    document.getElementById('cardView').classList.add('on');
    renderCards();
  }
}

function renderTabs(){
  const bar = document.getElementById('tabbar');
  bar.innerHTML = SECTIONS.map(s => {
    const c = SEC_COLORS[s];
    const on = s === curSec;
    return `<button class="tab ${on?'on':''}" onclick="selectSec('${s}')"
      style="color:${on?c:'#404040'};border-top-color:${on?c:'transparent'}">${s}</button>`;
  }).join('');
}

function renderMenu(){
  const menu = document.getElementById('workMenu');
  menu.style.display = menuOpen ? 'block' : 'none';
  if(!menuOpen){ menu.innerHTML=''; return; }
  menu.innerHTML = works.map(w => {
    const active = w.id === curWid;
    if(editingWid === w.id){
      return `<div class="wm-item ${active?'active':''}">
        <input class="wm-input" id="wm_input_${w.id}" value="${esc(w.title)}" onblur="finishEditWork('${w.id}')" onkeydown="if(event.key==='Enter')finishEditWork('${w.id}')">
      </div>`;
    }
    return `<div class="wm-item ${active?'active':''}">
      <span class="wm-name ${active?'active':''}" onclick="selectWork('${w.id}')">${esc(w.title)||'無題'}</span>
      <button class="wm-edit-btn" onclick="startEditWork('${w.id}')">編集</button>
      ${works.length>1?`<button class="wm-del-btn" onclick="delWork('${w.id}')">×</button>`:''}
    </div>`;
  }).join('') + `<div class="wm-add" onclick="addWork()">＋ 新しい作品</div>`;
  // focus input if editing
  if(editingWid){
    setTimeout(()=>{ const el=document.getElementById('wm_input_'+editingWid); if(el)el.focus(); }, 0);
  }
}

function renderEpBar(){
  const w = getWork(); if(!w) return;
  const eps = w.eps || [];
  const color = SEC_COLORS['コンテ'];
  let html = `<button class="ep-btn ${curEp==='unset'?'on':''}" onclick="selectEp('unset')" style="${curEp==='unset'?'color:'+color+';border-bottom-color:'+color:''}">未割当</button>`;
  eps.forEach(ep => {
    const on = curEp === ep.id;
    html += `<button class="ep-btn ${on?'on':''}" onclick="selectEp('${ep.id}')" style="${on?'color:'+color+';border-bottom-color:'+color:''}">${esc(ep.name)}</button>`;
  });
  if(addingEp){
    html += `<input class="ep-input" id="epInput" placeholder="例：1話" onkeydown="if(event.key==='Enter')finishAddEp();if(event.key==='Escape')cancelAddEp();" onblur="finishAddEp()">`;
  } else {
    html += `<button class="ep-add-btn" onclick="startAddEp()">＋</button>`;
  }
  document.getElementById('epRow').innerHTML = html;
  if(addingEp) setTimeout(()=>{ const el=document.getElementById('epInput'); if(el)el.focus(); }, 0);
}

function renderConteTA(){
  const w = getWork(); if(!w) return;
  const key = getConteKey();
  document.getElementById('conteTA').value = w.data[key] || '';
}

function renderCards(){
  const w = getWork(); if(!w) return;
  const text = w.data[curSec] || '';
  const blocks = parseBlocks(text);
  const color = SEC_COLORS[curSec];
  const cv = document.getElementById('cardView');

  let html = blocks.map((b, i) => {
    if(editingCardIdx === i){
      return `<div class="card">
        <div class="card-edit">
          <input class="edit-head" id="edit_h_${i}" value="${esc(b.heading)}" placeholder="見出し" style="border:1px solid ${color}66">
          <textarea class="edit-body" id="edit_b_${i}" rows="4">${esc(b.body)}</textarea>
          <div class="edit-acts">
            <button class="btn-save" onclick="saveCard(${i})">保存</button>
            <button class="btn-cancel" onclick="cancelCard()">キャンセル</button>
          </div>
        </div>
      </div>`;
    }
    return `<div class="card">
      <div class="card-head">
        <span class="card-heading" style="color:${color}">${esc(b.heading)||'（見出しなし）'}</span>
        <button class="card-edit-btn" onclick="startEditCard(${i})">編集</button>
        <button class="card-del-btn" onclick="delCard(${i})">×</button>
      </div>
      ${b.body ? `<div class="card-body">${esc(b.body)}</div>` : ''}
    </div>`;
  }).join('');

  if(addingCard){
    html += `<div class="card" style="border-color:${color}66">
      <div class="card-edit" style="padding:12px">
        <textarea class="add-block-ta" id="addBlockTA" placeholder="見出し&#10;内容を書く"></textarea>
        <div class="edit-acts">
          <button class="btn-save" onclick="submitAddCard()">追加</button>
          <button class="btn-cancel" onclick="cancelAddCard()">キャンセル</button>
        </div>
      </div>
    </div>`;
  } else {
    html += `<button class="add-trigger" onclick="startAddCard()" style="--c:${color}"
      onmouseover="this.style.borderColor='${color}66';this.style.color='${color}'"
      onmouseout="this.style.borderColor='#1e1e1e';this.style.color='#3a3a3a'">＋ ブロックを追加</button>`;
  }

  cv.innerHTML = html;
  if(addingCard) setTimeout(()=>{ const el=document.getElementById('addBlockTA'); if(el)el.focus(); }, 0);
  if(editingCardIdx !== null) setTimeout(()=>{ const el=document.getElementById('edit_h_'+editingCardIdx); if(el)el.focus(); }, 0);
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── actions ──
function toggleMenu(){ menuOpen = !menuOpen; renderMenu(); }

function selectWork(id){ curWid=id; curEp='unset'; menuOpen=false; editingCardIdx=null; addingCard=false; save(); render(); }

function startEditWork(id){ editingWid=id; renderMenu(); }

function finishEditWork(id){
  const el=document.getElementById('wm_input_'+id);
  if(el){ const w=works.find(x=>x.id===id); if(w) w.title=el.value; }
  editingWid=null; save(); renderMenu();
  if(id===curWid) document.getElementById('workTitle').textContent=getWork()?.title||'';
}

function addWork(){
  const w={id:uid(),title:`作品${works.length+1}`,data:{基本:'',構成:'',キャラ:'',プロット:'',シーン:'',コンテ:''},eps:[]};
  works.push(w); curWid=w.id; menuOpen=false; editingWid=w.id; save(); render();
}

function delWork(id){
  if(works.length<=1) return;
  if(!confirm('この作品を削除しますか？')) return;
  const idx=works.findIndex(w=>w.id===id);
  works=works.filter(w=>w.id!==id);
  if(curWid===id){ curWid=works[Math.max(0,idx-1)].id; }
  save(); render();
}

function selectSec(s){ curSec=s; editingCardIdx=null; addingCard=false; render(); }

function selectEp(id){ curEp=id; renderEpBar(); renderConteTA(); }

function startAddEp(){ addingEp=true; renderEpBar(); }

function finishAddEp(){
  const el=document.getElementById('epInput'); if(!el) return;
  const name=el.value.trim();
  if(name){
    const w=getWork(); if(!w) return;
    const id=uid();
    if(!w.eps) w.eps=[];
    w.eps.push({id,name});
    curEp=id; save();
  }
  addingEp=false; renderEpBar(); renderConteTA();
}

function cancelAddEp(){ addingEp=false; renderEpBar(); }

function saveConteTA(){
  const w=getWork(); if(!w) return;
  const key=getConteKey();
  w.data[key]=document.getElementById('conteTA').value;
  save();
}

function startEditCard(i){ editingCardIdx=i; addingCard=false; renderCards(); }

function saveCard(i){
  const h=document.getElementById('edit_h_'+i)?.value||'';
  const b=document.getElementById('edit_b_'+i)?.value||'';
  const w=getWork(); if(!w) return;
  const blocks=parseBlocks(w.data[curSec]);
  blocks[i]={heading:h,body:b};
  w.data[curSec]=blocksToText(blocks);
  editingCardIdx=null; save(); renderCards();
}

function cancelCard(){ editingCardIdx=null; renderCards(); }

function delCard(i){
  const w=getWork(); if(!w) return;
  const blocks=parseBlocks(w.data[curSec]).filter((_,idx)=>idx!==i);
  w.data[curSec]=blocksToText(blocks);
  editingCardIdx=null; save(); renderCards();
}

function startAddCard(){ addingCard=true; editingCardIdx=null; renderCards(); }

function submitAddCard(){
  const ta=document.getElementById('addBlockTA'); if(!ta) return;
  const text=ta.value.trim(); if(!text){ addingCard=false; renderCards(); return; }
  const lines=text.split('\n');
  const h=lines[0]; const b=lines.slice(1).join('\n');
  const w=getWork(); if(!w) return;
  const blocks=parseBlocks(w.data[curSec]);
  blocks.push({heading:h,body:b});
  w.data[curSec]=blocksToText(blocks);
  addingCard=false; save(); renderCards();
}

function cancelAddCard(){ addingCard=false; renderCards(); }

function exportWork(){
  const w=getWork(); if(!w) return;
  const body=SECTIONS.map(s=>`■ ${s}\n${w.data[s]||'（未記入）'}`).join('\n\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([`【${w.title}】\n\n${body}`],{type:'text/plain;charset=utf-8'}));
  a.download=`${w.title}.txt`; a.click();
}

// ── init ──
load();
render();
</script>
</body>
</html>
